<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto formulário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <form id="formulario" action="" method="">
        <div class="row">
            <div class="col-6">
                 <label for="nomeAnimal" class="form-label">Digite o nome do animal:</label>
                <input type="text" name="nomeAnimal" id="nomeAnimal" placeholder="Informe nome do animal..." size="20" maxlength="20" required class="form-control"><br><br>
            </div>
        </div>
       
        <div class="row">
            <div class="col-6">
                <label for="telefone" class="form-label">Telefone de contato:</label>
                <input type="tel" name="telefone" id="telefone" pattern="\([0-9]{2}\)[\s][0-9]{5}-[0-9]{4}" required placeholder="(99) 99999-9999" class="form-control"><br><br>
            </div>
        </div>
        
        <div class="row">
            <div class="col-6">
                <label for="datanasc" class="form-label">Informe a data de nascimento: </label>
                <input type="date" name="datanasc" id="datanasc" max="2026-04-14" class="form-control"><br><br>
            </div>
            <div class="col-6">
                <label for="carteiravacina" class="form-label">Insira a carteira de vacinação:</label>
                <input type="file" name="carteiravacina" id="carteiravacina" class="form-control"><br><br>
            </div>
        </div>
        
        
        <div class="row">
            <div class="col-6">
                <label for="racaAnimal" class="form-label">Informe a raça do animal:</label>
                <select name="racaAnimal" id="racaAnimal" class="form-select">
                    <optgroup label="Doméstico">
                        <option value="pinscher">Pinscher</option>
                        <option value="pitbull">Pitbull</option>
                        <option value="pastoralemao">Pastor Alemão</option>
                        <option value="semraca">Sem raça definida</option>
                    </optgroup>
                    <optgroup label="Silvestre">
                        <option value="cobra">Cobra</option>
                    </optgroup>
                </select><br><br>
            </div>
            <div class="col-3">
                <label for="corAnimal" class="form-label">Insira a cor do animal:</label><br>
                <input type="color" name="corAnimal" id="corAnimal" class="form-control"><br><br>
            </div>
            <div class="col-3">
                <label for="temperamento" class="form-label">Temperamento:</label>
                <input type="range" name="temperamento" id="temperamento" min=0 max=100 step=10 class="form-range"><br><br>
            </div>
        </div>
        
        

        <label for="porte" class="form-check-label">Informe o porte do animal:</label><br>
        <input type="radio" name="pequeno" id="pequeno" class="form-check-input"><label for="pequeno">Pequeno</label><br>
        <input type="radio" name="medio" id="medio" class="form-check-input"><label for="medio">Médio</label><br>
        <input type="radio" name="grande" id="grande" class="form-check-input"><label for="grande">Grande</label><br><br>

        <label for="servico" class="form-check-label">Informe o serviço:</label><br>
        <input type="checkbox" name="banho" id="banho" class="form-check-input"><label for="banho">Banho</label><br>
        <input type="checkbox" name="tosasimples" id="tosasimples" class="form-check-input"><label for="tosasimples">Tosa Simples</label><br>
        <input type="checkbox" name="tosahigienica" id="tosahigienica" class="form-check-input"><label for="tosahigienica">Tosa Higiênica</label><br>
        <input type="checkbox" name="vacinacao" id="vacinacao" class="form-check-input"><label for="vacinacao">Vacinação</label><br><br>

        <label for="observacao">Observações do animal:</label><br>
        <textarea name="observacao" id="observacao" cols="50" rows="10">
            Coloque as informações aqui...
        </textarea><br>

        <button value="submit" class="btn btn-primary">Enviar formulário</button>
        <button value="Vizualizar" onclick="visualizar()" class="btn btn-primary">Vizualizar</button>
        <button value="Limpar" onclick="Limpar()" class="btn btn-primary">Limpar formulário</button>
        <script src="script.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </form>
</body>
</html>
